#*************************************************************************************************************************
# Groups
#*************************************************************************************************************************
# roles_config.yml file takes input parameters for the composable Functional_Groups and groups.
# This file contains Functional_Groups and Groups used by the omnia for cluster formation.
# Groups: - Groups will contain the list of groups defined by the user. User must define atleast one group.
#   grpN:                 - <Mandatory> "grpN" -  User defined name of the group. Range for N is 0-99
#     cluster_name:       - <Conditional Mandatory> Name of the cluster to which the group belongs. This input is case-sensitive. This will remain empty for groups which are not associated with any kubernetes Functional_Groups.
#     location_id:        - <Mandatory> SU-<n>.RACK-<n> Scalable unit and rack number range is 0-99. This input is case-sensitive. Please use uppercase letters only.
#     resource_mgr_id:    - <Conditional Mandatory> list of service tag of active head node(s).
#                         - Set the value only for group of nodes belonging to kube_node and slurm_node Functional_Groups,
#                         - And empty for other Functional_Groups.
#     parent:             - <Conditional Mandatory> list of service tag of associated active service node(s).
#                         - This field will be empty for group of nodes which is associated with ‘login_node’, ‘compiler_node’,
#                         - ‘auth_server’, ‘service_kube_control_plane’, 'service_etcd', ‘kube_control_plane’, ‘etcd’, 'slurm_control_node’.
#                         - If ‘service’ Functional_Groups is not defined, then value will be empty for worker and default Functional_Groups.
#     bmc_details:        - <Conditional Mandatory> BMC IP static range in the format 10.5.0.1-10.5.0.200
#        static_range:    - <Mandatory> This field mandatory in case of BMC discovery of subset of nodes
#     switch_details      - <Conditional Mandatory> Switch details of the Rack
#        ip:              - <Mandatory> IP address of the switch
#        ports:           - <Mandatory> ports of the switch
#     architecture        - <Mandatory> architecture of the nodes - x86_64 or aarch64
#

Groups:
  grp0:
    location_id: SU-1.RACK-1
    cluster_name: ""
    resource_mgr_id: ""
    parent: ""
    bmc_details:
      static_range: ""
    switch_details:
      ip: ""
      ports: ""
    architecture: "x86_64"

  # grp1:
  #   location_id: SU-1.RACK-2
  #   cluster_name: ""
  #   resource_mgr_id: ""
  #   parent: ""
  #   bmc_details:
  #     static_range: ""
  #   switch_details:
  #     ip: ""
  #     ports: ""
  #   architecture: "aarch64"

#************************************************************************************************************************
#  Functional_Groups
#************************************************************************************************************************
# Atleast one Functional_Groups is mandatory, and User is not allowed to change the name of the Functional_Groups.
# Maximum number of Functional_Groups supported are 100.
# Note: Nested Functional_Groups and groups are not supported.
# The Functional_Groups are case sensitive
#   - name:                           - <Mandatory> Name of the Functional_Groups, can be any of the following Omnia defined Functional_Groups.
#     groups:                         - <Mandatory> list of groups defined by the user
#

# This table lists the Functional_Groups and the layers they belong to in the cluster.

# +----------------------------+-----------------+     +------------------------+----------------+
# | Functional_Groups Name     | Layer           |     | Functional_Groups Name | Layer          |
# +----------------------------+-----------------+     +------------------------+----------------+
# | oim_ha_node                | management      |     | default                | compute        |
# | service_kube_control_plane | management      |     | kube_node              | compute        |
# | service_etcd               | management      |     | slurm_node             | compute        |
# | service_kube_node          | management      |     |                        |                |
# | login_node                 | management      |     |                        |                |
# | auth_server                | management      |     |                        |                |
# | compiler_node              | management      |     |                        |                |
# | kube_control_plane         | management      |     |                        |                |
# | etcd                       | management      |     |                        |                |
# | slurm_control_node         | management      |     |                        |                |
# +----------------------------+-----------------+     +------------------------+----------------+

# Default Functional_Groups:
# -------------
#
# This Functional_Groups is provided to cover the default Functional_Groups of the cluster.
#
# The default Functional_Groups is assigned to nodes which do not fit into any specific Functional_Groups.
# If user wants to just provision the group of nodes without associating with any Functional_Groups,
# then the default Functional_Groups can be used.
#
# This Functional_Groups belongs to the compute layer.
#
Functional_Groups:
  - name: "default"
    groups:
      - grp0


